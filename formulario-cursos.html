<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscripción a Cursos</title>

<link rel="stylesheet" href="formulario-cursos.css">

</head>

<body>

<section class="formulario-cursos">

    <div class="contenedor-formulario">

        <h1>Inscripción a Cursos</h1>

        <p>Completa el siguiente formulario y nos pondremos en contacto contigo para confirmar tu inscripción.</p>

        <form>

            <div class="fila">

                <div class="campo">
                    <label>Nombre completo</label>
                    <input type="text" required>
                </div>

                <div class="campo">
                    <label>Correo electrónico</label>
                    <input type="email" required>
                </div>

            </div>

            <div class="fila">

                <div class="campo">
                    <label>Teléfono</label>
                    <input type="tel" required>
                </div>

                <div class="campo">
                    <label>Edad</label>
                    <input type="number" min="10">
                </div>

            </div>

            <div class="fila">

                <div class="campo">
                    <label>Curso de interés</label>

                    <select required>

                        <option>Seleccione una opción</option>
                        <option>Paquetería Office</option>
                        <option>Mantenimiento de PC</option>
                        <option>Programación Básica</option>
                        <option>Redes Básicas</option>
                        <option>Diseño Gráfico</option>

                    </select>

                </div>

                <div class="campo">

                    <label>Modalidad</label>

                    <select>

                        <option>Presencial</option>
                        <option>En línea</option>

                    </select>

                </div>

            </div>

            <div class="fila">

                <div class="campo">
                    <label>Día preferido</label>

                    <select>

                        <option>Lunes</option>
                        <option>Miércoles</option>
                        <option>Viernes</option>

                    </select>

                </div>

                <div class="campo">

                    <label>Horario preferido</label>

                    <select>

                        <option>09:00 - 11:00</option>
                        <option>11:00 - 13:00</option>
                        <option>14:00 - 16:00</option>

                    </select>

                </div>

            </div>

            <div class="campo">

                <label>¿Tienes conocimientos previos?</label>

                <select>

                    <option>No</option>
                    <option>Básicos</option>
                    <option>Intermedios</option>

                </select>

            </div>

            <div class="campo">

                <label>Comentarios</label>

                <textarea rows="5"></textarea>

            </div>

            <button type="submit" class="btn-enviar">
                Inscribirme
            </button>

        </form>

    </div>

</section>

</body>
</html>
