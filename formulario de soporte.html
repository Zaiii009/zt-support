<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitud de Soporte | Future Tech ZT</title>

<link rel="stylesheet" href="estilos.css">

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:WhiteSmoke;
}

.formulario{
    width:90%;
    max-width:850px;
    margin:50px auto;
    background:GhostWhite;
    padding:40px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.10);
}

.formulario h1{
    text-align:center;
    color:purple;
    margin-bottom:10px;
}

.formulario p{
    text-align:center;
    color:#666;
    margin-bottom:35px;
}

label{
    display:block;
    margin-top:18px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    resize:none;
}

.radio{
    display:flex;
    gap:20px;
    margin-top:10px;
}

.radio label{
    font-weight:normal;
}

button{
    margin-top:30px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:40px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:purple;
}

button:hover{
    opacity:.9;
}

</style>

</head>

<body>

<div class="formulario">

<h1>Solicitud de Soporte Técnico</h1>

<p>Completa el siguiente formulario y uno de nuestros técnicos se pondrá en contacto contigo.</p>

<form>

<label>Nombre completo</label>
<input type="text" required>

<label>Teléfono</label>
<input type="tel" required>

<label>Correo electrónico</label>
<input type="email" required>

<label>Tipo de soporte</label>

<div class="radio">

<label><input type="radio" name="tipo"> Presencial</label>

<label><input type="radio" name="tipo"> A distancia</label>

</div>

<label>Marca del equipo</label>
<input type="text">

<label>Modelo del equipo</label>
<input type="text">

<label>Sistema operativo</label>

<select>

<option>Seleccione una opción</option>

<option>Windows 11</option>

<option>Windows 10</option>

<option>Windows 8</option>

<option>Windows 7</option>

<option>macOS</option>

<option>Linux</option>

<option>Android</option>

<option>iOS</option>

</select>

<label>Describe el problema</label>

<textarea rows="6" placeholder="Describe detalladamente el problema..."></textarea>

<label>¿Desde cuándo ocurre?</label>

<input type="text">

<label>Nivel de urgencia</label>

<select>

<option>Baja</option>

<option>Media</option>

<option>Alta</option>

</select>

<label>Adjuntar fotografías (opcional)</label>

<input type="file" multiple>

<button type="submit">

Enviar Solicitud

</button>

</form>

</div>

</body>
</html>
